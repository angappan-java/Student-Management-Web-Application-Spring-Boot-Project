<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Spring Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
      body{
            background-image:url("/images/img 2.webp");
            background-size:cover;
            background-repeat:norepeat;
            background-attachment:fixed;
        }
     </style>
  </head>
  <body>
    <div class="container my-4">
        <div class="row">
            <div class="col-md-8 mx-auto rounded border p-4"style="background-color:white" >
            <h2 class="text-center mb-3">Admin Edit</h2>
              <form  th:action="@{/edit}" method="post">
              <div class="row mb-3">
                <label class="col-sm-4 col-form-label">Admin Id</label>
                <div class="col-sm-8">
                    <input class="form-control" readonly="readonly" th:field="${admin.id}">
                    
                 </div>
              </div>
              
               <div class="row mb-3">
                <label class="col-sm-4 col-form-label">Name</label>
                <div class="col-sm-8">
                    <input class="form-control" th:field="${admin.name}">
                   
                 </div>
              </div>
              
               <div class="row mb-3">
                <label class="col-sm-4 col-form-label">Password</label>
                <div class="col-sm-8">
                    <input class="form-control" th:field="${admin.pass}">
                    
                 </div>
              </div>
                 <div class="row">
                    <div class="offset-sm-4 col-sm-4 d-grid" >
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </div>
                    
                    <div class="col-sm-4 d-grid" >
                        <a class="btn btn-outline-danger" th:href="@{/getalladmin}">Cancel</a>
                    </div>
                        <div th:if="${msg}">
                           <p th:text="${msg}"></p>
                        </div>
                        <div th:if="${err}">
                           <p th:text="${err}"></p>
                        </div>
                    </div><br>
                   <div class="row">
                      <div class="offset-sm-4 col-sm-8 d-grid" >
                        <a th:href="@{/getalladmin}" class="btn btn-success">Back</a>
                    </div>
                    
                   </div> 
                   
               </form>
              </div>
            </div>
        </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>

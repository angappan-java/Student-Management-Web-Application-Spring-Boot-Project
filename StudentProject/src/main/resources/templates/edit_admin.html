<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Spring Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
      body{
            background-image:url("/images/img 2.webp");
            background-size:cover;
            background-repeat:norepeat;
            background-attachment:fixed;
        }
     </style>
  </head>
  <body>
    <div class="container my-4">
        <div class="row">
            <div class="form-control mx-auto rounded border p-4 w-50" style="background-color:white" >
            <h4 class="text-center mb-3">ADMIN EDIT</h4>
             <div class="text-center mx-auto">
                 <div  th:if="${msg}" class="fw-bold alert alert-warning alert-dismissible fade show" role="alert">
                       <p th:text="${msg}" class="text-primary text-center"></p>
                       <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                 </div>
                 <div  th:if="${err}" class="fw-bold alert alert-warning alert-dismissible fade show" role="alert">
                       <p th:text="${err}" class="text-danger text-center"></p> 
                       <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                 </div>      
            </div>
              <form  th:action="@{/editadmin}" method="post" th:object="${admin}">
              
              <div class="row mb-3">
                <label class="col-sm-4 col-form-label">Admin Id</label>
                <div class="col-sm-8">
                    <input class="form-control" th:field="*{id}" readonly="readonly">
                    
                 </div>
              </div>
              
               <div class="row mb-3">
                <label class="col-sm-4 col-form-label">Name</label>
                <div class="col-sm-8">
                    <input class="form-control" th:field="*{name}">
                   
                 </div>
              </div>
              
               <div class="row mb-3">
                <label class="col-sm-4 col-form-label fw-bold">Email</label>
                <div class="col-sm-8">
                    <input type="email" class="form-control"  th:field="*{email}">
                    
                 </div>
              </div>
              <div class="row mb-3">
                <label class="col-sm-4 col-form-label fw-bold">Password</label>
                <div class="col-sm-8">
                    <div class="position-relative">
                      <input type="password" class="form-control" name="pass" id="password" th:field="*{password}">
                      <i class="bi bi-eye-slash position-absolute top-50 end-0 translate-middle-y me-3" id="eye"
                          style="cursor:pointer;" onclick="toggleEye()"></i>
                 </div>
                    
                 </div>
              </div>
              <div class="row mb-3">
                <label class="col-sm-4 col-form-label fw-bold">Role</label>
                <div class="col-sm-8">
                    <input type="text" class="form-control" th:field="*{role}"  readonly >
                    
                 </div>
              </div>
                 <div class="row">
                    <div class="offset-md-4 col-md-4 d-grid" >
                        <button type="submit" class="btn btn-primary fw-bold">Submit</button>
                    </div>                  
                    <div class="col-md-4 d-grid" >
                        <a class="btn btn-danger fw-bold" th:href="@{/getalladmin}">BACK</a>
                    </div>                       
                    </div>
               </form>
              </div>
            </div>
        </div>
        <script th:src="@{/js/script.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>

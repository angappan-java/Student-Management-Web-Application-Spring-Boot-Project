<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student SpringBoot Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  </head>
  <body style="background-color: black">
    <div class="container p-5">
      <div style="display: flex;flex-direction:column; align-items:center; justify-content:center;margin-top:200px;">
       <h4 class="text-center text-white fw-bold">FEATURES INFORMATION</h4>
       <div class="row mt-5">
          <div class="col-xl-3">
             <a type="button" th:href="@{/student}" class="btn btn-primary fw-bold">STUDENT</a>
          </div>
          <div class="col-xl-3">
             <a type="button" th:href="@{/course}" class="btn btn-primary fw-bold">COURSE</a>
          </div>
          <div class="col-xl-3">
             <a type="button" th:href="@{/getalladmin}" class="btn btn-primary fw-bold">ADMIN</a>
          </div>
          <div class="col-xl-3">
             <a type="button" th:href="@{/logout}" class="btn btn-primary fw-bold">LOGOUT</a>
          </div>
       </div>
      </div>
    </div>
           
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>

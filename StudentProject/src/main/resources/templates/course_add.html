<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student SpringBoot Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <style>
        body{
            background-image:url("/images/img 2.webp");
            background-size:cover;
            background-repeat:norepeat;
            background-attachment:fixed;
        }
        .center-content{
           display:flex;
           flex-direction:column;
           justify-content:center;
           align-items:center;
           height:100%
        }
        .custom-button{
           background-color:blue;
           border:none;
           padding:10px 20px;
           color:white;
           font-size:18px;
           border-radius:5px;
           text-decoration:none;
           align-items:center;
           margin:20px;
        }
        .custom-button:hover{
           background-color:grey;
        }
     </style>
  </head>
  <body>
    <div class="container my-4" >
        <div class="row" >
            <div class="col-md-8 mx-auto rounded border p-4" style="background-color:white">
            <h2 class="text-center mb-3">Course Register</h2>
              <form  th:action="@{/addcourse}" th:object="${course}" method="post">
              <div th:if="${msg}" class="alert alert-success alert-dismissible fade show" role="alert">
                   <span th:text="${msg}"></span>
                   <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
              <div class="row mb-3">
                <label class="col-sm-4 col-form-label">Course Id</label>
                <div class="col-sm-8">
                    <input class="form-control" name="id" required >
                    
                 </div>
              </div>
              <div class="row mb-3">
                <label class="col-sm-4 col-form-label">Course Name</label>
                <div class="col-sm-8">
                    <input class="form-control"  name="name"   >
                    <p th:if="${#fields.hasErrors('name')}"
                        th:errorClass="text-danger"
                        th:errors="${course.name}"></p>
                 </div>
              </div>
              
              <div class="row">
                    <div class="offset-sm-4 col-sm-8 d-grid" >
                        <button type="submit" class="btn btn-primary">Submit</button>
                     </div>
              </div><br>
              <div class="row">
                   <div class=" offset-sm-4 col-sm-8 d-grid">
                        <a class="btn btn-success" th:href="@{/student}">Back</a>
                    </div>
              </div>
          </form>
          
         </div>
                    
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>

<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
         body::-webkit-scrollbar{
            display: none;
            overflow-x:hidden;
            overflow-y:hidden;
        }
         body{
            background-image:url("/images/img 2.webp");
            background-size:cover;
            background-repeat:norepeat;
            background-attachment:fixed;
        }
        .hero-section{
          height:100vh;
          display:flex;
          flex-direction:column;
          justify-content:center;
          align-items:center;
          text-align:center;
          color:black;
          position:relative;
        }
        .btn-custom{
            font-size:1.5rem;
            padding:10px 20px;
            border-radius:10px;
        }
    
    
    </style>
  </head>
  <body>
    <div  class="hero-section">
       <div  class="hero-content">
          <h4 class="text-center text-success fw-bold">ALL ADMIN INFORMATION</h4>
            <div class="text-center mx-auto">
                 <div  th:if="${msg}" class="fw-bold alert alert-warning alert-dismissible fade show" role="alert">
                       <p th:text="${msg}" class="text-primary text-center"></p>
                       <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                 </div>
                 <div  th:if="${err}" class="fw-bold alert alert-warning alert-dismissible fade show" role="alert">
                       <p th:text="${err}" class="text-danger text-center"></p> 
                       <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                 </div>      
            </div>
            <table class="table table-bordered table-hover">
              <thead class="table-dark">
                 <tr>
                    <th>Id</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Action</th>
                    <th>Action</th>
                 </tr>
               </thead>
               <tbody>
                   <tr th:each="admin : ${admindetails}">
                     <td th:text="${admin.id}"></td>
                     <td th:text="${admin.name}"></td>
                     <td th:text="${admin.email}"></td>
                     <td>
                        <a th:href="@{/edit/{id}(id=${admin.id})}" class="btn btn-primary fw-bold">Edit</a>
                     </td>
                     <td>
                         <a th:href="@{/delete/{id}(id=${admin.id})}" onclick="return confirm('Are you Sure ?')"
                          class="btn btn-danger fw-bold">Delete</a>
                     </td>
                   </tr>
               
               </tbody>
           </table>
            <div class="row">
                <div class="offset-md-4 col-md-4 d-grid">
                     <a th:href="@{/features}" class=" btn btn-success fw-bold" >Back</a>
                </div>  
            </div>
       </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>

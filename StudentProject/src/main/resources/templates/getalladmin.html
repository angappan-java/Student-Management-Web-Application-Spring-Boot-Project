<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
         body{
            background-image:url("/images/img 2.webp");
            background-size:cover;
            background-repeat:norepeat;
            background-attachment:fixed;
        }
        .hero-section{
          height:100vh;
          display:flex;
          flex-direction:column;
          justify-content:center;
          align-items:center;
          text-align:center;
          color:black;
          position:relative;
        }
        .btn-custom{
            font-size:1.5rem;
            padding:10px 20px;
            border-radius:10px;
        }
    
    
    </style>
  </head>
  <body>
    <div  class="hero-section">
       <div  class="hero-content">
          <h2 class="display-3 fw-bold">All Admin</h2>
            <table class="table table-bordered table-hover">
              <thead class="table-dark">
                 <tr>
                    <th>Id</th>
                    <th>Name</th>
                    <th>Password</th>
                    <th>Action</th>
                 </tr>
               </thead>
               <tbody>
                   <tr th:each="user : ${admin}">
                     <td th:text="${user.id}"></td>
                     <td th:text="${user.name}"></td>
                     <td th:text="${user.pass}"></td>
                     <td>
                        <a th:href="@{/edit/{id}(id=${user.id})}" class="btn btn-primary">Edit</a>
                        
                         <a th:href="@{/delete/{id}(id=${user.id})}" onclick="return confirm('Are you Sure ?')"
                          class="btn btn-danger">Delete</a>
                     </td>
                   
                   </tr>
               
               </tbody>
           </table>
               <div th:if="${msg}">
                  <p th:text="${msg}"></p>
               </div>
               <div th:if="${err}">
                 <p th:text="${err}"></p>
               </div>
            <div class="row">
                <a th:href="@{/student}" class="offset-col-sm-4 btn btn-success" >Back</a>
            </div>
       </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>

<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student SpringBoot Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <style>
        body{
            background-image:url("/images/img 2.webp");
            background-size:cover;
            background-repeat:norepeat;
            background-attachment:fixed;
        }
        .center-content{
           display:flex;
           flex-direction:column;
           justify-content:center;
           align-items:center;
           height:100%
        }
        .custom-button{
           background-color:blue;
           border:none;
           padding:10px 20px;
           color:white;
           font-size:18px;
           border-radius:5px;
           text-decoration:none;
           align-items:center;
           margin:20px;
        }
        .custom-button:hover{
           background-color:grey;
        }
     </style>
  </head>
  <body>
    <div class="container my-4" >
        <div class="row" >
               <h1 class="text-center">Welcome To Our Student Website</h1>              
            <div class="col-md-8 mx-auto rounded border p-4" style="background-color:white">
            <h2 class="text-center mb-3">Admin Login</h2>
              <form  th:action="@{/login}" method="post">
              <div class="row mb-3">
                <label class="col-sm-4 col-form-label fw-bold">User Name</label>
                <div class="col-sm-8">
                    <input type="text" class="form-control" name="name" required >
                    
                 </div>
              </div>
              <div class="row mb-3">
                <label class="col-sm-4 col-form-label fw-bold">Password</label>
                <div class="col-sm-8">
                    <input type="password" class="form-control"  name="pass" required>
                    
                 </div>
              </div>
              <div class="row">
                       <div th:if="${err}" class="offset-sm-4" >
                          <br><p  th:text="${err}" style="color:red"></p><br>
                       </div>
                    <div class="offset-sm-4 col-sm-4 d-grid" >
                        
                        <button type="submit" class="btn btn-primary">Login</button>
                    </div>
                    <div class="col-sm-4 d-grid" >
                        <a class="btn btn-success" th:href="@{/register}">New Register</a>
                    </div>
             </div><br><br>
             <div class="row">
                     <div class="offset-sm-6">
                        <a th:href="@{/reset}" class="btn btn-danger" style="color:black">Forget Password ?</a>
                     </div>
             </div>
            </form>
            
           </div>
         </div>
       </div>
           
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>

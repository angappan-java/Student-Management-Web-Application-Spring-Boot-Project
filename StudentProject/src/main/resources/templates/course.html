<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student SpringBoot Project</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        body::-webkit-scrollbar{
            display: none;
            overflow-x:hidden;
            overflow-y:hidden;
        }
    </style>
  </head>
  <body style="background-color: black;">
    <div class="container p-5">
    <h4 class="text-center text-white fw-bold">COURSE INFORMATION</h4>
      <div class="d-flex justify-content-end">
         <a type="button" th:href="@{/addcourse}" class="btn btn-primary fw-bold">ADD COURSE</a>
      </div><br>
      <div class="text-center mx-auto">
        <div  th:if="${msg}" class="fw-bold alert alert-warning alert-dismissible fade show" role="alert">
            <p th:text="${msg}" class="text-primary text-center"></p>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div  th:if="${err}" class="fw-bold alert alert-warning alert-dismissible fade show" role="alert">
           <p th:text="${err}" class="text-danger text-center"></p> 
           <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>      
     </div>
        <div class="table-responsive-lg">
           <table class="table table-bordered table-hover">
              <thead class="table-dark">
                 <tr>
                   <th>Course Id</th>
                   <th>Course Name</th>
                   <th>Action</th>
                   <th>Action</th>
                 </tr>
              </thead>
              <tbody>
                 <tr th:each="course :${coursedetails}">
                   <td th:text="${course.id}"></td>
                   <td th:text="${course.name}"></td>
                   <td>
                      <a type="button" th:href="@{/editcourse/{id}(id=${course.id})}" class="btn btn-primary fw-bold"><i class="bi bi-pencil-square"></i>&nbsp;EDIT</a>
                   </td>
                   <td>
                      <form th:action="@{/delete/{id}(id=${course.id})}" method="post">
                         <button type="submit" class="btn btn-danger fw-bold" onclick="return confirm('Are you Sure?')"><i class="bi bi-trash-fill"></i>&nbsp;Delete</button>                                                                                         
                    </form>
                   </td>
                 </tr>
              </tbody>
           </table>
        </div> 
       <div class="row mt-5">
          <div class="offset-md-4 col-md-4 d-grid">
             <a type="button" th:href="@{/features}" class="btn btn-success fw-bold">BACK</a>
          </div>
      </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>

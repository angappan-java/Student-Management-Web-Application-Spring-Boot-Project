<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student SpringBoot Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <style>
        body{
            background-image:url("/images/img 2.webp");
            background-size:cover;
            background-repeat:norepeat;
            background-attachment:fixed;
        }
        .center-content{
           display:flex;
           flex-direction:column;
           justify-content:center;
           align-items:center;
           height:100%
        }
        .custom-button{
           background-color:blue;
           border:none;
           padding:10px 20px;
           color:white;
           font-size:18px;
           border-radius:5px;
           text-decoration:none;
           align-items:center;
           margin:20px;
        }
        .custom-button:hover{
           background-color:grey;
        }
     </style>
  </head>
  <body>
    <h1 class="text-center">Student Page</h1>
    <br><br><br>
    <div th:if="${msg}" class="alert alert-success alert-dismissible fade show" role="alert">
       <span th:text="${msg}"></span>
       <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
      
      <a th:href="@{/addstudent}" class="custom-button">ADD STUDENT</a>
      <a th:href="@{/editstudent}" class="custom-button">EDIT STUDENT</a>
      <a th:href="@{/addcourse}" class="custom-button">ADD COURSE</a>
      <a th:href="@{/editcourse}" class="custom-button">EDIT COURSE</a>
      <a th:href="@{/getalladmin}" class="custom-button">GET ALL ADMIN</a>
      <a th:href="@{/pdf}" class="custom-button">Student PDF</a>
      <a th:href="@{/logout}" class="custom-button">LOGOUT</a>
      
        
      
      
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>

<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student SpringBoot Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
     <style>
        body::-webkit-scrollbar{
            display: none;
            overflow-x:hidden;
            overflow-y:hidden;
        }
        body{
            background-image:url("/images/img 2.webp");
            background-size:cover;
            background-repeat:norepeat;
            background-attachment:fixed;
            overflow-x:hidden;
        }
        .center-content{
           display:flex;
           flex-direction:column;
           justify-content:center;
           align-items:center;
           height:100%
        }
        .custom-button{
           background-color:blue;
           border:none;
           padding:10px 20px;
           color:white;
           font-size:18px;
           border-radius:5px;
           text-decoration:none;
           align-items:center;
           margin:20px;
        }
        .custom-button:hover{
           background-color:grey;
        }
     </style>
  </head>
  <body>
   <div class="container p-5">
      <h1 class="text-center text-white fw-bold">STUDENT INFORMATION</h1>
    <br><br><br>
    <div class="text-center mx-auto">
        <div  th:if="${msg}" class="fw-bold alert alert-warning alert-dismissible fade show" role="alert">
            <p th:text="${msg}" class="text-primary text-center"></p>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div  th:if="${err}" class="fw-bold alert alert-warning alert-dismissible fade show" role="alert">
           <p th:text="${err}" class="text-danger text-center"></p> 
           <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>      
     </div>
     <div class="d-flex justify-content-end">
        <a type="button" th:href="@{/addstudent}" class="btn btn-primary fw-bold"><i class="bi bi-bag-plus-fill"></i>&nbsp;ADD STUDENT</a>
     </div><br>
      <div class="table-responsive-lg">
          <table class="table table-bordered table-hover">
             <thead class="table-dark">
                <tr>
                  <th>Student Image</th>
                  <th>Student Id</th>
                  <th>Student Name</th>
                  <th>Student Age</th>
                  <th>Student Gender</th>
                  <th>Student DOB</th>
                  <th>Course Id</th>
                  <th>Register Time</th>
                  <th>Action</th>
                  <th>Action</th>
                </tr>
             </thead>
             <tbody>
                <tr th:each="student :${studentdetails}">
                  <td>
                    <img th:src="@{'/images/'+${student.image}}" style="width:80px;height:80px;border-radius:10px;">
                  </td>
                  <td th:text="${student.id}"></td>
                  <td th:text="${student.name}"></td>
                  <td th:text="${student.age}"></td>
                  <td th:text="${student.gender}"></td>
                  <td th:text="${student.dob}"></td>
                  <td th:text="${student.course.id}"></td>
                  <td th:text="${student.time}"></td>
                  <td>
                    <a type="button" th:href="@{/editstudent/{id}(id=${student.id})}" class="btn btn-primary fw-bold"><i class="bi bi-pencil-square"></i>&nbsp;EDIT</a>
                  </td>
                  <td>
                    <form th:action="@{/studentdelete/{id}(id=${student.id})}" method="post">
                         <button type="submit" class="btn btn-danger fw-bold" onclick="return confirm('Are you Sure?')"><i class="bi bi-trash-fill"></i>&nbsp;Delete</button>                                                                                         
                    </form> 
                  </td>
                </tr>
             </tbody>
          </table>
      </div>
      <div class="row mt-5">
          <div class="offset-md-4 col-md-4 d-grid">
             <a type="button" th:href="@{/features}" class="btn btn-success fw-bold">BACK</a>
          </div>
      </div>
      
      
      
      <a th:href="@{/getalladmin}" class="custom-button">GET ALL ADMIN</a>
      <a th:href="@{/pdf}" class="custom-button">Student PDF</a>
    
   </div>
    
      
        
      
      
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>

<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student SpringBoot Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <style>
        body::-webkit-scrollbar{
            display: none;
            overflow-x:hidden;
            overflow-y:hidden;
        }
        body{
            background-image:url("/images/img 2.webp");
            background-size:cover;
            background-repeat:norepeat;
            background-attachment:fixed;
        }
        .center-content{
           display:flex;
           flex-direction:column;
           justify-content:center;
           align-items:center;
           height:100%
        }
        .custom-button{
           background-color:blue;
           border:none;
           padding:10px 20px;
           color:white;
           font-size:18px;
           border-radius:5px;
           text-decoration:none;
           align-items:center;
           margin:20px;
        }
        .custom-button:hover{
           background-color:grey;
        }
     </style>
  </head>
  <body>
    <div class="container my-4" >
        <div class="row mt-5" >
            <div class="form-control mx-auto rounded border p-4 w-50" style="background-color:white">
            <h4 class="text-center text-primary fw-bold mb-3">SEARCH ADMIN</h4>
              <form  th:action="@{/search}" method="post">
              <div class="row mb-3">
                <label class="col-sm-4 form-label fw-bold">Admin Id</label>
                <div class="col-sm-8">
                    <input class="form-control" name="id" required >
                 </div>
               </div>
               <div class="row">
                  <div class="offset-md-4 col-md-4 d-grid" >
                        <button type="submit" class="btn btn-primary fw-bold">Search</button>
                    </div>
                    <div class="col-md-4 d-grid">
                       <a type="button" th:href="@{/}" class="btn btn-success fw-bold">BACK</a>
                    </div>
                 </div>            
            </form>            
             <br><br>
             
             <div th:if="${admin!=null}">
                 
                 <h4 class="text-center mb-3">Reset Admin</h4>
                 
                   <div class="text-center mx-auto">
                       <div  th:if="${msg}" class="fw-bold alert alert-warning alert-dismissible fade show" role="alert">
                             <p th:text="${msg}" class="text-primary text-center"></p>
                             <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                       </div>
                       <div  th:if="${err}" class="fw-bold alert alert-warning alert-dismissible fade show" role="alert">
                              <p th:text="${err}" class="text-danger text-center"></p> 
                              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                       </div>      
                  </div>
                    <form th:action="@{/reset}" method="post" th:object="${admin}">
                        <div class="row mb-3">
                             <label class="col-sm-4 col-form-label">Admin Id</label>
                                 <div class="col-sm-8">
                                      <input class="form-control" th:field="*{id}" readonly>
                                  </div>
                          </div>
               
                          <div class="row mb-3">
                               <label class="col-sm-4 col-form-label">Email</label>
                                     <div class="col-sm-8">
                                           <input class="form-control" th:field="*{email}" readonly>
                                       </div>
                           </div>
               
                            <div class="row mb-3">
                                   <label class="col-sm-4 col-form-label">Password</label>
                                         <div class="col-sm-8">
                                               <input class="form-control" name="password">
                                          </div>
                            </div>
                            <div class="row mb-3">
                                 <div class="offset-md-4 col-md-8 d-grid" >
                                     <button type="submit" class="btn btn-primary fw-bold">Change Password</button>           
                                 </div>
                            </div>
                    </form>
                    
             </div> 
        </div>
      </div>
    </div>     
          
    
     
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>

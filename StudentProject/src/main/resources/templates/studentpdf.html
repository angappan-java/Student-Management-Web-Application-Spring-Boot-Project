<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student SpringBoot Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <style>
        body{
            background-image:url("/images/img 2.webp");
            background-size:cover;
            background-repeat:norepeat;
            background-attachment:fixed;
        }
        .center-content{
           display:flex;
           flex-direction:column;
           justify-content:center;
           align-items:center;
           height:100%
        }
        .custom-button{
           background-color:blue;
           border:none;
           padding:10px 20px;
           color:white;
           font-size:18px;
           border-radius:5px;
           text-decoration:none;
           align-items:center;
           margin:20px;
        }
        .custom-button:hover{
           background-color:grey;
        }
     </style>
  </head>
  <body>
    <div class="container my-4" >
        <div class="row" >
               <h1 class="text-center">Student PDF</h1>              
            <div class="col-md-8 mx-auto rounded border p-4" style="background-color:white">
                <form th:action="@{/studentpdf}" method="get">
                <div class="row mb-3">
                  <label class="col-sm-4 col-form-label fw-bold">Student Id</label>
                         <div class="col-sm-8">
                               <input  type="text" class="form-control"   name="id" >
                          </div>               
               </div>
               <div class="row">
                          <div th:if="${msg}" class="offset-sm-4">
                              <span th:text="${msg}" class="text-primary"></span>
                          </div>
                           <div th:if="${err}" class="offset-sm-4">
                              <span th:text="${err}" class="text-danger"></span>
                          </div>
                          <br><br>
                          <div class="offset-sm-4 col-sm-4 d-grid" >
                              <button type="submit"  class="btn btn-primary">Download PDF</button>                                                                                        
                          </div>
                          <div class="col-sm-4 d-grid" >
                              <a th:href="@{/student}" class="btn btn-success">Logout</a>                                                                                        
                          </div>
                </div>                
             </form>           
           </div>
         </div>
       </div>
           
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
